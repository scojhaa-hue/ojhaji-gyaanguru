<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>GyaanGuru @ Satish</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#4c1d95"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e1b4b,#4c1d95,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.app{width:100%;max-width:480px;background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border-radius:28px;border:1px solid rgba(255,255,255,.15);padding:28px 22px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:70px;height:70px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;box-shadow:0 8px 24px rgba(124,58,237,.5)}
.title{font-size:1.7rem;font-weight:800;color:#fff;letter-spacing:-.5px}
.sub{font-size:.82rem;color:rgba(255,255,255,.6);margin-top:4px}

/* LANG TOGGLE */
.lang-toggle{display:flex;gap:8px;margin-bottom:20px;background:rgba(255,255,255,.08);border-radius:12px;padding:4px}
.lang-btn{flex:1;padding:8px;border:none;border-radius:9px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.lang-btn.active{background:#7c3aed;color:#fff;box-shadow:0 4px 12px rgba(124,58,237,.4)}
.lang-btn:not(.active){background:transparent;color:rgba(255,255,255,.6)}

/* SUBJECT & GRADE */
.row{display:flex;gap:8px;margin-bottom:14px}
.sel{flex:1;padding:11px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-size:.85rem;font-family:inherit;outline:none}
.sel option{background:#2d1b69;color:#fff}

/* INPUTS */
.lbl{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:6px;display:block}
.inp{width:100%;padding:13px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:14px;color:#fff;font-size:.9rem;font-family:inherit;outline:none;transition:all .2s;margin-bottom:14px}
.inp::placeholder{color:rgba(255,255,255,.4)}
.inp:focus{border-color:#a855f7;background:rgba(255,255,255,.15)}
textarea.inp{resize:vertical;line-height:1.6;min-height:100px}

/* MODE */
.mode-row{display:flex;gap:7px;margin-bottom:14px}
.mode-btn{flex:1;padding:9px 6px;border:1px solid rgba(255,255,255,.2);border-radius:11px;background:transparent;color:rgba(255,255,255,.6);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.mode-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed}

/* PHOTO */
.photo-row{display:flex;gap:8px;margin-bottom:14px}
.photo-btn{flex:1;padding:14px 6px;border:2px dashed rgba(168,85,247,.5);border-radius:12px;background:rgba(168,85,247,.1);color:#a855f7;font-weight:700;font-size:.8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit}
.photo-btn .pi{font-size:1.6rem}
.img-prev{width:100%;border-radius:12px;border:2px solid #a855f7;max-height:180px;object-fit:cover;margin-bottom:10px;display:block}
.img-ok{padding:6px 10px;background:rgba(34,197,94,.15);border-radius:8px;color:#4ade80;font-size:.74rem;font-weight:600;margin-bottom:10px}

/* SUBMIT */
.sbmt{width:100%;padding:16px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.3px;box-shadow:0 8px 24px rgba(124,58,237,.4);transition:all .2s;font-family:inherit}
.sbmt:disabled{background:rgba(255,255,255,.15);box-shadow:none;cursor:not-allowed}
.sbmt:not(:disabled):active{transform:scale(.98)}

/* LOADER */
.loader{text-align:center;margin-top:20px;color:rgba(255,255,255,.8)}
.spin{display:inline-block;font-size:2rem;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:.83rem;margin-top:8px;font-weight:600}

/* RESULT */
.result{margin-top:22px;border-radius:18px;overflow:hidden}
.r-hdr{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:14px 16px;display:flex;align-items:center;gap:10px}
.r-hdr-ic{font-size:1.4rem}
.r-hdr-t{color:#fff;font-weight:800;font-size:.95rem}
.r-hdr-s{color:rgba(255,255,255,.75);font-size:.71rem;margin-top:2px}
.score-row{background:#faf5ff;border-left:5px solid #a855f7;padding:13px 16px;font-size:1.1rem;font-weight:800;color:#4c1d95}
.r-sec{padding:12px 16px;border-bottom:1px solid #f3f4f6}
.r-sec-h{font-weight:700;font-size:.88rem;margin-bottom:4px}
.r-sec p{margin:3px 0;font-size:.84rem;line-height:1.65;color:#374151}
.rst{width:100%;padding:13px;background:#fff;color:#7c3aed;border:2px solid #7c3aed;border-top:none;font-size:.94rem;font-weight:700;cursor:pointer;font-family:inherit}
.qecho{margin-top:10px;padding:9px 12px;background:rgba(168,85,247,.1);border-radius:10px;color:#c4b5fd;font-size:.75rem}

.foot{text-align:center;margin-top:22px;font-size:.7rem;color:rgba(255,255,255,.4)}

/* ERROR */
.err{padding:10px 13px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:11px;color:#fca5a5;font-size:.83rem;margin-bottom:11px}
</style>
</head>
<body>
<div class="app">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="title">GyaanGuru @ Satish</div>
    <div class="sub">Next-Gen AI Personalized Learning</div>
  </div>

  <!-- LANG TOGGLE -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="lhi" onclick="setLang('hi')">🇮🇳 हिंदी</button>
    <button class="lang-btn" id="len" onclick="setLang('en')">🇬🇧 English</button>
  </div>

  <!-- SUBJECT & GRADE -->
  <div class="row">
    <select class="sel" id="subj">
      <option value="science">🔬 विज्ञान</option>
      <option value="math">📐 गणित</option>
      <option value="hindi">📖 हिंदी</option>
      <option value="history">🏛️ इतिहास</option>
      <option value="geo">🌍 भूगोल</option>
      <option value="civics">⚖️ नागरिक शास्त्र</option>
      <option value="english">🔤 English</option>
      <option value="gk">💡 सामान्य ज्ञान</option>
    </select>
    <select class="sel" id="grade">
      <option>Class 6</option>
      <option>Class 7</option>
      <option>Class 8</option>
      <option>Class 9</option>
      <option selected>Class 10</option>
      <option>Class 11</option>
      <option>Class 12</option>
      <option>प्रतियोगिता</option>
    </select>
  </div>

  <!-- QUESTION -->
  <label class="lbl" id="lq">❓ QUESTION / प्रश्न</label>
  <input type="text" class="inp" id="qI" placeholder="जैसे: प्रकाश संश्लेषण क्या है?"/>

  <!-- ANSWER MODE -->
  <div class="mode-row">
    <button class="mode-btn active" id="mTx" onclick="setMode('text')">⌨️ <span id="mTxL">टाइप करें</span></button>
    <button class="mode-btn" id="mIm" onclick="setMode('image')">📷 <span id="mImL">फोटो अपलोड</span></button>
  </div>

  <!-- TEXT ANSWER -->
  <div id="txA">
    <label class="lbl" id="la">✍️ ANSWER / आपका उत्तर</label>
    <textarea class="inp" id="aI" placeholder="अपना उत्तर यहाँ लिखें..."></textarea>
  </div>

  <!-- IMAGE ANSWER -->
  <div id="imA" style="display:none">
    <div class="photo-row">
      <button class="photo-btn" onclick="document.getElementById('cIn').click()">
        <span class="pi">📸</span>Camera
      </button>
      <button class="photo-btn" onclick="document.getElementById('gIn').click()">
        <span class="pi">🖼️</span>Gallery
      </button>
    </div>
    <input type="file" id="cIn" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"/>
    <input type="file" id="gIn" accept="image/*" style="display:none" onchange="handleImg(this)"/>
    <div id="iW" style="display:none">
      <div style="position:relative">
        <img id="iP" src="" class="img-prev"/>
        <button onclick="rmImg()" style="position:absolute;top:7px;right:7px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer">✕</button>
      </div>
      <div class="img-ok" id="iOk">✅ फोटो तैयार — गुरु जी पढ़ेंगे!</div>
    </div>
  </div>

  <div class="err" id="eB" style="display:none"></div>

  <!-- SUBMIT -->
  <button class="sbmt" id="sBtn" onclick="check()">
    <span id="sBtnT">Analyze My Answer ✨</span>
  </button>

  <!-- LOADER -->
  <div class="loader" id="lB" style="display:none">
    <span class="spin">🎓</span>
    <p id="lT">गुरु जी उत्तर की जाँच कर रहे हैं...</p>
  </div>

  <!-- RESULT -->
  <div id="rB"></div>

  <div class="foot">Crafted with Precision by Satish Sir © 2026</div>
</div>

<script>
// Gemini API used
let lang = 'hi', mode = 'text', imgB64 = null;

const SC = {
  "✅":{bg:"#f0fdf4",b:"#22c55e",h:"#15803d"},
  "📝":{bg:"#fff7ed",b:"#f97316",h:"#c2410c"},
  "💡":{bg:"#eff6ff",b:"#3b82f6",h:"#1d4ed8"},
  "🌟":{bg:"#fefce8",b:"#eab308",h:"#854d0e"}
};

function setLang(l) {
  lang = l;
  document.getElementById('lhi').className = 'lang-btn' + (l==='hi' ? ' active' : '');
  document.getElementById('len').className = 'lang-btn' + (l==='en' ? ' active' : '');

  const hi = l === 'hi';
  document.getElementById('lq').textContent = hi ? '❓ प्रश्न लिखें' : '❓ Write Your Question';
  document.getElementById('la').textContent = hi ? '✍️ आपका उत्तर लिखें' : '✍️ Write Your Answer';
  document.getElementById('qI').placeholder = hi ? 'जैसे: प्रकाश संश्लेषण क्या है?' : 'e.g. What is photosynthesis?';
  document.getElementById('aI').placeholder = hi ? 'अपना उत्तर यहाँ लिखें...' : 'Write your answer here...';
  document.getElementById('mTxL').textContent = hi ? 'टाइप करें' : 'Type Answer';
  document.getElementById('mImL').textContent = hi ? 'फोटो अपलोड' : 'Upload Photo';
  document.getElementById('iOk').textContent = hi ? '✅ फोटो तैयार — गुरु जी पढ़ेंगे!' : '✅ Photo ready — Ojha Ji will evaluate!';
  document.getElementById('sBtnT').textContent = hi ? 'गुरु जी से जाँच कराएं ✨' : 'Analyze My Answer ✨';
  document.getElementById('lT').textContent = hi ? 'गुरु जी उत्तर की जाँच कर रहे हैं...' : 'Ojha Ji is evaluating your answer...';

  // Update subject options
  const subj = document.getElementById('subj');
  if (hi) {
    subj.innerHTML = `<option value="science">🔬 विज्ञान</option><option value="math">📐 गणित</option><option value="hindi">📖 हिंदी</option><option value="history">🏛️ इतिहास</option><option value="geo">🌍 भूगोल</option><option value="civics">⚖️ नागरिक शास्त्र</option><option value="english">🔤 English</option><option value="gk">💡 सामान्य ज्ञान</option>`;
  } else {
    subj.innerHTML = `<option value="science">🔬 Science</option><option value="math">📐 Mathematics</option><option value="english">📖 English</option><option value="history">🏛️ History</option><option value="geo">🌍 Geography</option><option value="civics">⚖️ Civics</option><option value="biology">🧬 Biology</option><option value="gk">💡 General Knowledge</option>`;
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('mTx').className = 'mode-btn' + (m==='text' ? ' active' : '');
  document.getElementById('mIm').className = 'mode-btn' + (m==='image' ? ' active' : '');
  document.getElementById('txA').style.display = m==='text' ? 'block' : 'none';
  document.getElementById('imA').style.display = m==='image' ? 'block' : 'none';
}

function handleImg(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    document.getElementById('iP').src = e.target.result;
    document.getElementById('iW').style.display = 'block';
  };
  r.readAsDataURL(f);
}

function rmImg() {
  imgB64 = null;
  document.getElementById('iW').style.display = 'none';
  document.getElementById('iP').src = '';
  document.getElementById('cIn').value = '';
  document.getElementById('gIn').value = '';
}

async function check() {
  const q = document.getElementById('qI').value.trim();
  const a = document.getElementById('aI').value.trim();
  const subj = document.getElementById('subj').options[document.getElementById('subj').selectedIndex].text;
  const grade = document.getElementById('grade').value;
  const eB = document.getElementById('eB');
  eB.style.display = 'none';

  const hi = lang === 'hi';
  if (!q) { eB.textContent = hi ? 'प्रश्न लिखना ज़रूरी है! 🙏' : 'Please write your question! 🙏'; eB.style.display = 'block'; return; }
  if (mode === 'text' && !a) { eB.textContent = hi ? 'उत्तर लिखें! 🙏' : 'Please write your answer! 🙏'; eB.style.display = 'block'; return; }
  if (mode === 'image' && !imgB64) { eB.textContent = hi ? 'फोटो अपलोड करें! 🙏' : 'Please upload photo! 🙏'; eB.style.display = 'block'; return; }

  document.getElementById('sBtn').disabled = true;
  document.getElementById('lB').style.display = 'block';
  document.getElementById('rB').innerHTML = '';

  const sys = hi
    ? `आप "ओझा जी" हैं — एक प्रेमपूर्ण हिंदी गुरु। केवल हिंदी में जवाब दें।\nविषय: ${subj} | कक्षा: ${grade}\nformat:\n⭐ अंक: X/10\n✅ क्या सही किया:\n📝 क्या सुधार होना चाहिए:\n💡 सही/पूरा उत्तर:\n🌟 गुरु जी का संदेश:`
    : `You are "Ojha Ji" — a warm encouraging teacher. Reply only in English.\nSubject: ${subj} | Class: ${grade}\nformat:\n⭐ Score: X/10\n✅ What was correct:\n📝 What needs improvement:\n💡 Complete correct answer:\n🌟 Teacher's message:`;

  const ctx = hi
    ? `प्रश्न: ${q}\n${mode === 'image' ? 'छात्र ने image में उत्तर लिखा।' : 'छात्र का उत्तर: ' + a}`
    : `Question: ${q}\n${mode === 'image' ? 'Student wrote answer in image.' : 'Student answer: ' + a}`;

  let content;
  if (mode === 'image' && imgB64) {
    content = [
      { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imgB64 } },
      { type: "text", text: ctx }
    ];
  } else {
    content = ctx;
  }

  // Gemini API key - localStorage में save होगी
  let apiKey = localStorage.getItem('gg_key') || '';
  if (!apiKey) {
    apiKey = prompt('अपनी Gemini API Key डालें (aistudio.google.com/apikey से लें):');
    if (!apiKey) { document.getElementById('sBtn').disabled = false; document.getElementById('lB').style.display = 'none'; return; }
    localStorage.setItem('gg_key', apiKey);
  }

  const prompt_text = sys + '\n' + ctx;
  let parts;
  if (mode === 'image' && imgB64) {
    parts = [{inline_data:{mime_type:"image/jpeg",data:imgB64}},{text:prompt_text}];
  } else {
    parts = [{text:prompt_text}];
  }

  try {
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=' + apiKey,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts}]})}
    );
    const data = await res.json();
    if (data.error) {
      if (data.error.code === 429 || data.error.message.includes('quota')) {
        localStorage.removeItem('gg_key');
        throw new Error('Quota खत्म! कल फिर try करें या नई key बनाएं।');
      }
      throw new Error(data.error.message);
    }
    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    renderResult(txt, q, subj, grade);
  } catch (e) {
    eB.textContent = (hi ? 'समस्या: ' : 'Error: ') + e.message;
    eB.style.display = 'block';
  } finally {
    document.getElementById('sBtn').disabled = false;
    document.getElementById('lB').style.display = 'none';
  }
}

function renderResult(txt, q, subj, grade) {
  const hi = lang === 'hi';
  const lines = txt.split('\n');
  let html = '', inS = false;
  lines.forEach(raw => {
    const l = raw.trim(); if (!l) return;
    if (l.startsWith('⭐')) {
      if (inS) { html += '</div>'; inS = false; }
      html += `<div class="score-row">${l}</div>`;
    } else if (['✅', '📝', '💡', '🌟'].some(e => l.startsWith(e))) {
      if (inS) html += '</div>';
      const c = SC[l[0]] || { bg: '#f9fafb', b: '#9ca3af', h: '#374151' };
      html += `<div class="r-sec" style="background:${c.bg};border-left:4px solid ${c.b}"><div class="r-sec-h" style="color:${c.h}">${l}</div>`;
      inS = true;
    } else if (inS) { html += `<p>${l}</p>`; }
  });
  if (inS) html += '</div>';

  const rstT = hi ? '🔄 नया प्रश्न आज़माएं' : '🔄 Try New Question';
  const qLbl = hi ? '💬 प्रश्न: ' : '💬 Q: ';
  const evalT = hi ? 'ओझा जी का मूल्यांकन' : "Ojha Ji's Evaluation";

  document.getElementById('rB').innerHTML = `
    <div class="result">
      <div class="r-hdr">
        <span class="r-hdr-ic">🎓</span>
        <div>
          <div class="r-hdr-t">${evalT}</div>
          <div class="r-hdr-s">${subj} • ${grade}</div>
        </div>
      </div>
      ${html}
      <button class="rst" onclick="resetApp()">${rstT}</button>
    </div>
    <div class="qecho">${qLbl}<em>${q}</em></div>`;
}

function resetApp() {
  document.getElementById('qI').value = '';
  document.getElementById('aI').value = '';
  rmImg(); setMode('text');
  document.getElementById('rB').innerHTML = '';
  document.getElementById('eB').style.display = 'none';
}
</script>
</body>
</html>
