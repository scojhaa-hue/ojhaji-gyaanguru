<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OjhaJi GyaanGuru</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #efe7dd; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; font-size: 16px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .ai { background: white; align-self: flex-start; border-top-left-radius: 0; border: 1px solid #ddd; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">OjhaJi GyaanGuru</h2>
        <small>अवध ओझा जी के अंदाज में शिक्षा</small>
    </div>
    <div id="chat">
        <div class="msg ai">प्रणाम बेटा! मैं ओझाजी ज्ञानगुरु हूँ। आज क्या सीखना चाहते हो? इतिहास, भूगोल या जीवन का दर्शन?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="अपना सवाल यहाँ लिखें..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">पूछें</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if(!text) return;

            // User message
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Loading message
            const loadingId = "load-" + Date.now();
            chat.innerHTML += `<div class="msg ai" id="${loadingId}">ओझाजी विचार कर रहे हैं...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // ध्यान दें: अगर आपका Cloudflare URL अलग है तो उसे नीचे बदलें
                const response = await fetch('https://gyaanguru2.scojhaa.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).innerText = data.response;
            } catch (e) {
                document.getElementById(loadingId).innerText = "लगता है ओझाजी अभी ध्यान में हैं। (Error: " + e.message + ")";
                console.error("Error details:", e);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
