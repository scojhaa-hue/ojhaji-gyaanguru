<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ओझाजी ज्ञानगुरु</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #111b21; display: flex; flex-direction: column; height: 100vh; color: #e9edef; }
        
        /* Header like an App */
        .app-header { background-color: #202c33; padding: 10px 16px; display: flex; align-items: center; border-bottom: 1px solid #313d45; }
        .avatar { width: 40px; height: 40px; background: #00a884; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
        .header-info h2 { margin: 0; font-size: 16px; color: #e9edef; }
        .header-info span { font-size: 12px; color: #8696a0; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; display: flex; flex-direction: column; gap: 8px; }
        
        .message { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; position: relative; }
        .user-msg { align-self: flex-end; background-color: #005c4b; color: #e9edef; border-top-right-radius: 0; }
        .ai-msg { align-self: flex-start; background-color: #202c33; color: #e9edef; border-top-left-radius: 0; }

        /* Input Bar */
        .input-bar { background-color: #202c33; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px 16px; border-radius: 24px; color: #d1d7db; outline: none; font-size: 15px; }
        button { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        button svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="avatar">O</div>
    <div class="header-info">
        <h2>ओझाजी ज्ञानगुरु</h2>
        <span>Online</span>
    </div>
</div>

<div id="chat-container">
    <div class="message ai-msg">प्रणाम! मैं ओझाजी हूँ। कहिये बेटा, आज क्या सेवा करूँ?</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="यहाँ टाइप करें..." onkeypress="if(event.key === 'Enter') send()">
    <button onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
</div>

<script>
    async function send() {
        const input = document.getElementById('userInput');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if(!text) return;

        // User Message
        container.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // AI Thinking
        const loadingId = "load-" + Date.now();
        container.innerHTML += `<div class="message ai-msg" id="${loadingId}">...</div>`;
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch('https://gyaanguru2.scojhaa.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            document.getElementById(loadingId).innerText = data.response;
        } catch (e) {
            document.getElementById(loadingId).innerText = "सर्वर से जुड़ नहीं पा रहा हूँ। अपना Cloudflare URL चेक करें।";
        }
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
