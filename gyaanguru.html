<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OjhaJi GyaanGuru</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: #2563eb; color: white; padding: 15px; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #dbeafe; align-self: flex-end; margin-left: auto; }
        .ai { background: white; border: 1px solid #ddd; }
        .input-box { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>OjhaJi GyaanGuru</h1></div>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="सवाल पूछें...">
        <button onclick="send()">भेजें</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if(!text) return;

            chat.innerHTML += <div class="msg user">${text}</div>;
            input.value = '';

            const resDiv = document.createElement('div');
            resDiv.className = 'msg ai';
            resDiv.innerText = 'सोच रहा हूँ...';
            chat.appendChild(resDiv);

            try {
                const response = await fetch('https://gyaanguru2.scojhaa.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                resDiv.innerText = data.response || "Error!";
            } catch (e) {
                resDiv.innerText = "कनेक्शन एरर!";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
