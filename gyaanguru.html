<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ओझाजी ज्ञानगुरु</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b141a; color: white; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #202c33; padding: 15px; text-align: center; border-bottom: 1px solid #313d45; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { align-self: flex-end; background: #005c4b; }
        .ai { align-self: flex-start; background: #202c33; }
        .input-area { padding: 10px; display: flex; gap: 5px; background: #202c33; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; }
        button { background: #00a884; border: none; color: white; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h2>ओझाजी ज्ञानगुरु</h2></div>
    <div id="chat"><div class="msg ai">प्रणाम! पूछो बेटा, क्या पूछना है?</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="यहाँ लिखें...">
        <button onclick="send()">➤</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if(!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'msg ai';
            loading.innerText = 'ओझाजी बोल रहे हैं...';
            chat.appendChild(loading);

            try {
                // सीधा Google Gemini से कनेक्शन
                const API_KEY = "AIzaSyDRjJ5LlTGauuejSVDhr-7BIiZwowbRXVg";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "तुम अवध ओझा सर के अंदाज़ में जवाब दो। जोश के साथ हिंदी में। सवाल: " + text }] }]
                    })
                });
                
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                loading.innerText = result;
            } catch (e) {
                loading.innerText = "नेटवर्क की दिक्कत है बेटा, फिर से पूछो।";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
