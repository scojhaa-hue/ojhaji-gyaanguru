
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सतीश ओझा ज्ञानगुरु</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .box { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); text-align: center; border-top: 5px solid #d32f2f; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin: 15px 0; background: #fff; text-align: left; border-radius: 10px; }
        .controls { display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 10px; outline: none; }
        button { padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2 style="color:#d32f2f;">सतीश ओझा ज्ञानगुरु</h2>
    <div id="chat"><strong>सतीश जी:</strong> खुश रहो बेटा! आज क्या पूछना है?</div>
    <div class="controls">
        <input type="text" id="askMe" placeholder="यहाँ लिखें...">
        <button onclick="startChat()">पूछें</button>
    </div>
</div>
<script>
    async function startChat() {
        const field = document.getElementById('askMe');
        const chatBox = document.getElementById('chat');
        const msg = field.value.trim();
        if (!msg) return;
        chatBox.innerHTML += `<div><b>आप:</b> ${msg}</div>`;
        field.value = "";
        const tempId = "loading";
        chatBox.innerHTML += `<div id="${tempId}"><em>मार्गदर्शन तैयार हो रहा है...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        try {
            const res = await fetch('https://gyaanguru-api.scojhaa.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div><b>सतीश जी:</b> ${data.response}</div>`;
        } catch (e) {
            document.getElementById(tempId).innerText = "नेटवर्क बाधा! फिर से पूछें।";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
