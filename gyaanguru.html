<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ओझाजी ज्ञानगुरु</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background-color: #0b141a; display: flex; flex-direction: column; height: 100vh; color: #e9edef; }
        
        /* App Header */
        .app-header { background-color: #202c33; padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid #313d45; position: sticky; top: 0; z-index: 100; }
        .avatar { width: 42px; height: 42px; background: #00a884; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; color: white; font-size: 20px; }
        .status-dot { width: 10px; height: 10px; background: #00a884; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Chat Window */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-image: linear-gradient(rgba(11, 20, 26, 0.95), rgba(11, 20, 26, 0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 16px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-msg { align-self: flex-end; background-color: #005c4b; color: #e9edef; border-top-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background-color: #202c33; color: #e9edef; border-top-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Input Area */
        .input-bar { background-color: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px 18px; border-radius: 25px; color: #d1d7db; outline: none; font-size: 16px; }
        button { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="app-header">
    <div class="avatar">ओ</div>
    <div>
        <div style="font-weight:bold; font-size: 17px;">ओझाजी ज्ञानगुरु</div>
        <div style="font-size:12px; color:#8696a0;"><span class="status-dot"></span>ऑनलाइन</div>
    </div>
</div>

<div id="chat-container">
    <div class="message ai-msg">प्रणाम बेटा! मैं अवध ओझा का AI अवतार हूँ। दुनिया जीतने का इरादा है? पूछो जो पूछना है!</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="अपना सवाल लिखें..." autocomplete="off">
    <button onclick="send()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
</div>

<script>
    async function send() {
        const input = document.getElementById('userInput');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if(!text) return;

        // User Message
        container.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // AI Typing indicator
        const loadingId = "load-" + Date.now();
        container.innerHTML += `<div class="message ai-msg" id="${loadingId}">ओझाजी विचार कर रहे हैं...</div>`;
        container.scrollTop = container.scrollHeight;

        try {
            // आपका सही Cloudflare Worker URL
            const response = await fetch('https://gyaanguru2.scojhaa.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            if (!response.ok) throw new Error("Server Error");
            
            const data = await response.json();
            document.getElementById(loadingId).innerText = data.response;
        } catch (e) {
            document.getElementById(loadingId).innerHTML = "बेटा, लगता है नेटवर्क में 'शक्ति' कम है। फिर से पूछो! <br><small style='color:red'>(Error: " + e.message + ")</small>";
        }
        container.scrollTop = container.scrollHeight;
    }

    // Enter key support
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') send();
    });
</script>

</body>
</html>
