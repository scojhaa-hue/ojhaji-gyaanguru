<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OjhaJi GyaanGuru</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 16px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .user { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .ai { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 12px 20px; border-radius: 50%; cursor: pointer; font-weight: bold; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">OjhaJi GyaanGuru</h2>
        <small>AI विद्यापीठ</small>
    </div>
    <div id="chat">
        <div class="msg ai">प्रणाम! मैं ओझाजी ज्ञानगुरु हूँ। आज आप क्या सीखना चाहते हैं?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="यहाँ अपना सवाल पूछें..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">➤</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if(!text) return;

            // User Message
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Placeholder for AI
            const resDiv = document.createElement('div');
            resDiv.className = 'msg ai';
            resDiv.innerText = 'ओझाजी विचार कर रहे हैं...';
            chat.appendChild(resDiv);
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('https://gyaanguru2.scojhaa.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                resDiv.innerText = data.response;
            } catch (e) {
                resDiv.innerText = "क्षमा करें, ओझाजी अभी विश्राम पर हैं। (Error Connecting)";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
